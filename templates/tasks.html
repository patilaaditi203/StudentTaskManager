{% extends 'layout.html' %}

{% block content %}

<h2>Task list</h2>

<table class="table table-bordered">

    <thread>

        <tr>
            <th>ID</th>
            <th>Task Name</th>
            <th>Description</th>
            <th>Maximum Marks</th>
        </tr>

    </thread>

    </tbody>

         {% for task in tasks %}

    </tr>

        <td>{{ task.task_id}}</td>
        <td>{{ task.task_name }}</td>
        <td>{{ task.description }}</td>
        <td>{{ task.maximum_marks}}</td>

    </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
